[env]
LUA_MODULES = "{{ config_root }}/.lua_modules"
_.python.venv = { path = ".venv", create = true, python = "3.13.13" }

[tools]
"asdf:mise-plugins/mise-lua" = "5.1"

[hooks]
postinstall = [
  "mkdir -p ${LUA_MODULES}",
  "luarocks install --tree=${LUA_MODULES} luacheck",
]

[hooks.enter]
shell = "zsh"
script = "eval $(luarocks path --tree=${LUA_MODULES})"
